spring:
  application:
    name: COLLABIDE

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/collabide_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Dp810@310}
    driver-class-name: org.postgresql.Driver


  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  sql:
    init:
      mode: never

logging:
  level:
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG

app:
  auth:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8080}

server:
  port: ${PORT:8082}
  address: 0.0.0.0